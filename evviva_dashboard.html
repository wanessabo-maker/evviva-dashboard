:root{--black:#0a0a0a;--white:#f5f5f3;--gray-200:#c8c8c5;--gray-400:#888884;--gray-600:#4a4a47;--accent:#c8b89a;--green:#4a7c59;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Avenir',Arial,sans-serif;font-weight:400;min-height:100vh;}
#auth-screen{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:2rem;}
.auth-logo img{height:56px;filter:invert(1);}
.auth-subtitle{font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gray-400);margin-top:-1.2rem;}
.auth-divider{width:1px;height:50px;background:linear-gradient(to bottom,transparent,var(--accent),transparent);}
.auth-text{font-size:1rem;font-weight:300;color:var(--gray-200);text-align:center;line-height:1.7;}
.btn-auth{background:transparent;border:1px solid var(--accent);color:var(--white);padding:.9rem 2.8rem;font-family:'Avenir',sans-serif;font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;cursor:pointer;transition:all .3s;}
.btn-auth:hover{background:var(--accent);color:var(--black);}
.auth-error{color:#c97a7a;font-size:.7rem;display:none;}
.loading-overlay{position:fixed;inset:0;background:rgba(10,10,10,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:1.5rem;}
.loading-logo img{height:44px;filter:invert(1);}
.loading-bar-track{width:180px;height:1px;background:rgba(200,184,154,.15);overflow:hidden;}
.loading-bar-fill{height:100%;background:var(--accent);animation:loadAnim 1.4s ease infinite;}
@keyframes loadAnim{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
.loading-text{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gray-400);}
header{display:flex;align-items:center;justify-content:space-between;padding:1.4rem 3rem;border-bottom:1px solid rgba(200,184,154,.12);position:sticky;top:0;background:rgba(10,10,10,.97);backdrop-filter:blur(10px);z-index:100;}
.header-left{display:flex;align-items:center;gap:1.8rem;}
.header-logo img{height:22px;filter:invert(1);}
.header-label{font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gray-400);border-left:1px solid rgba(200,184,154,.2);padding-left:1.8rem;}
.header-right{display:flex;align-items:center;gap:1.5rem;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:5px;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.last-update{font-size:.58rem;letter-spacing:.1em;color:var(--gray-400);text-transform:uppercase;}
.btn-refresh{background:transparent;border:1px solid rgba(200,184,154,.25);color:var(--accent);padding:.45rem 1.1rem;font-family:'Avenir',sans-serif;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:all .3s;}
.btn-refresh:hover{border-color:var(--accent);background:rgba(200,184,154,.06);}
.tabs{display:flex;border-bottom:1px solid rgba(200,184,154,.1);padding:0 3rem;background:var(--black);}
.tab{padding:1rem 1.8rem;font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gray-400);cursor:pointer;border-bottom:2px solid transparent;transition:all .3s;white-space:nowrap;}
.tab:hover{color:var(--gray-200);}
.tab.active{color:var(--white);border-bottom-color:var(--accent);}
.tab-count{display:inline-block;background:rgba(200,184,154,.12);color:var(--accent);font-size:.52rem;padding:1px 6px;border-radius:10px;margin-left:5px;}
main{padding:2rem 3rem;}
.content-panel{animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.summary-card{border:1px solid rgba(200,184,154,.12);padding:1.4rem 1.6rem;position:relative;overflow:hidden;transition:border-color .3s;}
.summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .4s;}
.summary-card:hover{border-color:rgba(200,184,154,.28);}
.summary-card:hover::before{transform:scaleX(1);}
.card-label{font-size:.55rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gray-400);margin-bottom:.6rem;}
.card-value{font-size:2.5rem;font-weight:300;color:var(--white);line-height:1;margin-bottom:.3rem;}
.card-sub{font-size:.58rem;color:var(--gray-400);}
.card-accent{color:var(--accent);}
.year-grid{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem;}
.year-pill{background:rgba(200,184,154,.08);border:1px solid rgba(200,184,154,.15);padding:2px 10px;font-size:.55rem;color:var(--accent);border-radius:2px;}
.universe-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:2rem;}
.universe-card{border:1px solid rgba(200,184,154,.12);padding:1.6rem;}
.universe-title{font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gray-400);line-height:1.6;margin-bottom:1.2rem;}
.universe-count{font-size:3rem;font-weight:300;color:var(--white);line-height:1;margin-bottom:.8rem;}
.progress-bar{height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;margin-bottom:.7rem;}
.progress-fill{height:100%;border-radius:1px;transition:width 1s ease;}
.u1 .progress-fill{background:var(--accent);}
.u2 .progress-fill{background:#6a9fd4;}
.universe-stats{display:flex;gap:1.2rem;}
.u-stat-val{display:block;font-size:.95rem;font-weight:300;color:var(--white);margin-bottom:1px;}
.u-stat-lbl{font-size:.52rem;color:var(--gray-400);text-transform:uppercase;letter-spacing:.12em;}
.mkp-panel{border:1px solid rgba(200,184,154,.12);padding:1.6rem;margin-bottom:2rem;}
.mkp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;flex-wrap:wrap;gap:.8rem;}
.mkp-title{font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gray-400);}
.mkp-filters{display:flex;gap:.6rem;flex-wrap:wrap;}
.mkp-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;}
.mkp-stat-card{background:rgba(200,184,154,.04);border:1px solid rgba(200,184,154,.08);padding:1rem 1.2rem;}
.mkp-stat-label{font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gray-400);margin-bottom:.4rem;}
.mkp-stat-value{font-size:1.8rem;font-weight:300;color:var(--white);}
.mkp-stat-sub{font-size:.55rem;color:var(--gray-400);margin-top:2px;}
.mkp-bars{margin-top:1.2rem;}
.bar-row{display:flex;align-items:center;gap:.8rem;margin-bottom:.5rem;}
.bar-row-label{font-size:.58rem;color:var(--gray-200);min-width:70px;text-align:right;}
.bar-track{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .8s ease;}
.bar-row-val{font-size:.58rem;color:var(--accent);min-width:45px;}
.table-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.6rem;}
.section-title{font-size:1rem;font-weight:300;color:var(--white);}
.table-controls{display:flex;gap:.6rem;flex-wrap:wrap;}
.filter-input,.filter-select{background:rgba(255,255,255,.04);border:1px solid rgba(200,184,154,.15);color:var(--white);padding:.45rem .9rem;font-family:'Avenir',sans-serif;font-size:.62rem;outline:none;transition:border-color .3s;}
.filter-input{width:200px;}
.filter-input::placeholder{color:var(--gray-400);}
.filter-input:focus,.filter-select:focus{border-color:var(--accent);}
.filter-select{cursor:pointer;}
.filter-select option{background:var(--black);}
table{width:100%;border-collapse:collapse;font-size:.82rem;}
thead tr{border-bottom:1px solid rgba(200,184,154,.18);}
th{font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gray-400);text-align:left;padding:.7rem .6rem;font-weight:400;white-space:nowrap;cursor:pointer;}
th:hover{color:var(--accent);}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s;}
tbody tr:hover{background:rgba(200,184,154,.04);}
td{padding:.7rem .6rem;color:var(--gray-200);font-weight:300;vertical-align:middle;}
td.name-cell{color:var(--white);font-weight:400;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
td.highlight{color:var(--accent);font-weight:500;}
.badge{display:inline-block;padding:2px 9px;font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;border-radius:2px;}
.badge-finalizado{background:rgba(74,124,89,.15);color:#7ab88a;border:1px solid rgba(74,124,89,.25);}
.badge-montagem{background:rgba(181,134,42,.15);color:#d4a84b;border:1px solid rgba(181,134,42,.25);}
.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:1.2rem;padding-top:.8rem;border-top:1px solid rgba(255,255,255,.04);}
.page-info{font-size:.58rem;color:var(--gray-400);}
.page-btns{display:flex;gap:.3rem;}
.page-btn{background:transparent;border:1px solid rgba(200,184,154,.15);color:var(--gray-200);padding:.3rem .7rem;font-family:'Avenir',sans-serif;font-size:.58rem;cursor:pointer;transition:all .2s;}
.page-btn:hover,.page-btn.active{border-color:var(--accent);color:var(--accent);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--gray-600);}
</style>
</head>

function loadScript(src) {
  return new Promise(function(res,rej){
    var s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

async function initMsal() {
  if (window.msal && window.msal.PublicClientApplication) return true;
  try { await loadScript('https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js'); }
  catch(e) {
    try { await loadScript('https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.0/lib/msal-browser.min.js'); }
    catch(e2) { return false; }
  }
  if (!window.msal || !window.msal.PublicClientApplication) return false;
  var config = {
    auth: { clientId: CLIENT_ID, authority: 'https://login.microsoftonline.com/common', redirectUri: REDIRECT_URI },
    cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
  };
  msalInstance = new window.msal.PublicClientApplication(config);
  await msalInstance.initialize();
  return true;
}

async function startAuth() {
  document.getElementById('auth-error').style.display = 'none';
  try {
    var ok = await initMsal();
    if (!ok) { loadDemoData(); return; }
    var accounts = msalInstance.getAllAccounts();
    if (accounts.length === 0) {
      await msalInstance.loginPopup({ scopes: SCOPES });
    }
    loadData();
  } catch(e) {
    console.error(e);
    document.getElementById('auth-error').style.display = 'block';
  }
}

async function getToken() {
  if (!msalInstance) return null;
  var accounts = msalInstance.getAllAccounts();
  if (!accounts.length) return null;
  try {
    var r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return r.accessToken;
  } catch(e) {
    var r2 = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    return r2.accessToken;
  }
}

async function loadData() {
  showLoading('Conectando ao SharePoint...');
  try {
    var token = await getToken();
    if (!token) { loadDemoData(); return; }
    setLoadingText('Lendo abas de resumo...');
    var sheetsRes = await fetch('https://graph.microsoft.com/v1.0/drives/'+DRIVE_ID+'/items/'+FILE_ID+'/workbook/worksheets', { headers: { Authorization: 'Bearer '+token } });
    var sheetsJson = await sheetsRes.json();
    var sheets = sheetsJson.value || [];
    var assistenciaSheet = null, engenhariaSheet = null;
    // Log all sheet names for debugging
    console.log('Available sheets:', sheets.map(function(s){ return s.name; }));
    for (var i=0; i<sheets.length; i++) {
      var n = sheets[i].name.toLowerCase().trim();
      // Aba Cliente Final: "RESUMO ABOU ATUAIS - ASSISTÊNCI"
      if (n.indexOf('resumo abou') >= 0 || n.indexOf('abou atuais') >= 0 || 
          (n.indexOf('abou') >= 0 && n.indexOf('atual') >= 0)) {
        assistenciaSheet = sheets[i];
      }
      // Aba Engenharia: "RESUMO CANAL ENG."
      if (n.indexOf('resumo canal') >= 0 || n.indexOf('canal eng') >= 0) {
        engenhariaSheet = sheets[i];
      }
    }
    console.log('Assistencia sheet:', assistenciaSheet ? assistenciaSheet.name : 'NOT FOUND');
    console.log('Engenharia sheet:', engenhariaSheet ? engenhariaSheet.name : 'NOT FOUND');
    universeData.assistencia = await readSheet(token, assistenciaSheet);
    universeData.engenharia = await readSheet(token, engenhariaSheet);
    processData();
    hideLoading();
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';
  } catch(e) {
    console.error(e);
    hideLoading();
    loadDemoData();
  }
}

function excelDateToStr(val) {
  if (!val) return '';
  var s = String(val).trim();
  if (!s || s === '0') return '';
  // Já está no formato DD/MM/AAAA ou similar
  if (s.indexOf('/') >= 0 || s.indexOf('-') >= 0) return s;
  // Serial do Excel
  var n = parseFloat(s);
  if (!isNaN(n) && n > 1000) {
    var d = new Date((n - 25569) * 86400 * 1000);
    var day = String(d.getUTCDate()).padStart(2,'0');
    var month = String(d.getUTCMonth()+1).padStart(2,'0');
    var year = d.getUTCFullYear();
    return day+'/'+month+'/'+year;
  }
  return s;
}

async function readSheet(token, sheet) {
  if (!sheet) return [];
  setLoadingText('Lendo: '+sheet.name+'...');
  var r = await fetch('https://graph.microsoft.com/v1.0/drives/'+DRIVE_ID+'/items/'+FILE_ID+'/workbook/worksheets/'+encodeURIComponent(sheet.id)+'/usedRange', { headers: { Authorization: 'Bearer '+token } });
  var j = await r.json();
  if (!j.values || j.values.length < 2) return [];

  // Encontrar linha de cabeçalho — buscar linha com 'CLIENTE'
  var headerRowIdx = -1;
  for (var i=0; i<j.values.length; i++) {
    var row = j.values[i];
    for (var c=0; c<row.length; c++) {
      if (String(row[c]||'').toUpperCase().trim() === 'CLIENTE') {
        headerRowIdx = i; break;
      }
    }
    if (headerRowIdx >= 0) break;
  }
  if (headerRowIdx < 0) return [];

  var headers = j.values[headerRowIdx].map(function(h){ return String(h||'').trim().toUpperCase(); });
  var dataRows = j.values.slice(headerRowIdx + 1);

  // Colunas fixas baseadas na estrutura visual da planilha
  // A=CLIENTE, B=DATA FINALIZACAO, C=VENDA(CONTRATO), D=CUSTO FÁBRICA
  // E=CUSTO LOCAL, F=TOTAL OBRA, G=LUCRO, H=MKP, I=HORAS MONTADOR, J=EFICIÊNCIA
  var colMap = {
    'CLIENTE': 0, 'DATA FINALIZACAO': 1, 'VENDA (CONTRATO)': 2,
    'CUSTO FABRICA': 3, 'CUSTO LOCAL': 4, 'TOTAL OBRA': 5,
    'LUCRO': 6, 'MKP': 7, 'HORAS MONTADOR': 8, 'EFICIENCIA (HORA)': 9
  };

  // Detectar índices reais pelos cabeçalhos
  var idxCliente = -1, idxData = -1, idxVenda = -1, idxCustoFab = -1;
  var idxCustoLoc = -1, idxTotal = -1, idxLucro = -1, idxMkp = -1;
  var idxHoras = -1, idxEfic = -1;
  headers.forEach(function(h, i) {
    var hu = h.toUpperCase().replace(/[^A-Z0-9]/g,'');
    if (hu === 'CLIENTE') idxCliente = i;
    else if (hu.indexOf('DATA') >= 0 || hu.indexOf('FINALIZ') >= 0) idxData = i;
    else if (hu.indexOf('VENDA') >= 0 || hu.indexOf('CONTRATO') >= 0) idxVenda = i;
    else if (hu.indexOf('CUSTOF') >= 0 || hu.indexOf('CUSTOFAB') >= 0 || (hu.indexOf('CUSTO') >= 0 && hu.indexOf('FAB') >= 0)) idxCustoFab = i;
    else if (hu.indexOf('CUSTOL') >= 0 || hu.indexOf('CUSTOLOC') >= 0 || (hu.indexOf('CUSTO') >= 0 && hu.indexOf('LOC') >= 0)) idxCustoLoc = i;
    else if (hu.indexOf('TOTALOB') >= 0 || hu.indexOf('TOTAL') >= 0) idxTotal = i;
    else if (hu.indexOf('LUCRO') >= 0) idxLucro = i;
    else if (hu === 'MKP') idxMkp = i;
    else if (hu.indexOf('HORAS') >= 0 || hu.indexOf('MONTADOR') >= 0) idxHoras = i;
    else if (hu.indexOf('EFIC') >= 0 || hu.indexOf('HORA') >= 0) idxEfic = i;
  });

  // Fallback para posições fixas se não encontrou pelos nomes
  if (idxCliente < 0) idxCliente = 0;
  if (idxData < 0) idxData = 1;
  if (idxVenda < 0) idxVenda = 2;
  if (idxCustoFab < 0) idxCustoFab = 3;
  if (idxCustoLoc < 0) idxCustoLoc = 4;
  if (idxTotal < 0) idxTotal = 5;
  if (idxLucro < 0) idxLucro = 6;
  if (idxMkp < 0) idxMkp = 7;
  if (idxHoras < 0) idxHoras = 8;
  if (idxEfic < 0) idxEfic = 9;

  var lastCliente = '';
  var results = [];

  dataRows.forEach(function(row) {
    var hasAnyData = row.some(function(c){ return c !== null && c !== '' && c !== undefined; });
    if (!hasAnyData) return;

    // Propagar cliente (células mescladas)
    var clienteVal = String(row[idxCliente] || '').trim();
    if (clienteVal && clienteVal.toUpperCase() !== 'CLIENTE') lastCliente = clienteVal;
    else if (!clienteVal) clienteVal = lastCliente;
    else clienteVal = lastCliente;

    // Ignorar linhas de cabeçalho repetido
    if (clienteVal.toUpperCase() === 'CLIENTE') return;

    // Data de finalização — REGRA PRINCIPAL
    var rawDate = row[idxData];
    var dateStr = excelDateToStr(rawDate);
    if (!dateStr) return; // Sem data = ignorar

    var obj = {
      'CLIENTE': clienteVal,
      'DATA FINALIZACAO': dateStr,
      'VENDA (CONTRATO)': row[idxVenda] !== undefined ? row[idxVenda] : '',
      'CUSTO FABRICA': row[idxCustoFab] !== undefined ? row[idxCustoFab] : '',
      'CUSTO LOCAL': row[idxCustoLoc] !== undefined ? row[idxCustoLoc] : '',
      'TOTAL OBRA': row[idxTotal] !== undefined ? row[idxTotal] : '',
      'LUCRO': row[idxLucro] !== undefined ? row[idxLucro] : '',
      'MKP': row[idxMkp] !== undefined ? row[idxMkp] : '',
      'HORAS MONTADOR': row[idxHoras] !== undefined ? row[idxHoras] : '',
      'EFICIENCIA (HORA)': row[idxEfic] !== undefined ? row[idxEfic] : ''
    };

    results.push(obj);
  });

  return results;
}

function parseCurrencyStatic(v) {
  if (typeof v === 'number') return v;
  var s = String(v||'0').replace('R$','').replace(/\./g,'').replace(',','.').trim();
  return parseFloat(s) || 0;
}

function loadDemoData() {
  showLoading('Carregando demonstração...');
  var nomes = ['Ana Beatriz Santos','Carlos Oliveira','Fernanda Lima','Ricardo Souza','Mariana Costa','Pedro Alves','Juliana Ferreira','Thiago Mendes','Camila Rodrigues','Eduardo Silva'];
  function makeRows(n) {
    var rows = [];
    for (var i=0; i<n; i++) {
      var hasDate = Math.random() > 0.3;
      var year = [2022,2023,2024,2025][Math.floor(Math.random()*4)];

      var day = String(Math.floor(Math.random()*28)+1).padStart(2,'0');

      var custoLoc = venda*(0.02+Math.random()*0.05);

      var lucro = venda-totalObra;

}

function getDateKey(row) {
  var keys = Object.keys(row);
  for (var i=0; i<keys.length; i++) {
    var k = keys[i].toUpperCase();
    if (k.indexOf('DATA') >= 0 || k.indexOf('FINALIZ') >= 0) return keys[i];
  }
  return '';
}

function parseYear(val) {
  if (!val) return null;
  var s = String(val).trim();
  if (!s) return null;
  var parts = s.split('/');
  if (parts.length === 3 && parts[2].length === 4) return parts[2];
  if (s.length >= 4 && s[4] === '-') return s.substring(0,4);
  var n = parseFloat(s);
  if (!isNaN(n) && n > 10000) {
    var d = new Date((n-25569)*86400*1000);
    return String(d.getFullYear());
  }
  return null;
}

function parseMonthYear(val) {
  if (!val) return null;
  var s = String(val).trim();
  if (!s) return null;
  var parts = s.split('/');
  if (parts.length === 3) return parts[1]+'/'+parts[2];
  if (s.length >= 7 && s[4] === '-') return s.substring(5,7)+'/'+s.substring(0,4);
  var n = parseFloat(s);
  if (!isNaN(n) && n > 10000) {
    var d = new Date((n-25569)*86400*1000);
    return String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
  }
  return null;
}

function isFinalized(row) {
  var k = getDateKey(row);
  return k && String(row[k]||'').trim() !== '';
}

function parseCurrency(v) {
  if (typeof v === 'number') return v;
  var s = String(v||'0').replace('R$','').replace(/\./g,'').replace(',','.').trim();
  return parseFloat(s) || 0;
}

function processData() {
  var allRows = universeData.assistencia.concat(universeData.engenharia);
  var yearsSet = {};
  allRows.forEach(function(r){ var y = parseYear(r[getDateKey(r)]); if(y) yearsSet[y]=1; });
  var years = Object.keys(yearsSet).sort();

  ['assistencia','engenharia'].forEach(function(tab){
    var sel = document.getElementById('year-filter-'+tab);
    sel.innerHTML = '<option value="">Todos os anos</option>' + years.map(function(y){ return '<option value="'+y+'">'+y+'</option>'; }).join('');
  });
  var mkpSel = document.getElementById('mkp-year-filter');
  mkpSel.innerHTML = '<option value="all">Todos os anos</option>' + years.map(function(y){ return '<option value="'+y+'">'+y+'</option>'; }).join('');

  renderSummaryCards();
  renderUniverseCards();
  renderMkp();
  renderTableHeaders('assistencia');
  renderTableHeaders('engenharia');
  renderTable('assistencia');
  renderTable('engenharia');

  document.getElementById('cnt-geral').textContent = allRows.length;
  document.getElementById('cnt-assistencia').textContent = universeData.assistencia.length;
  document.getElementById('cnt-engenharia').textContent = universeData.engenharia.length;
  document.getElementById('update-time').textContent = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function renderSummaryCards() {
  var all = universeData.assistencia.concat(universeData.engenharia);
  var finalized = all.filter(isFinalized);
  var inProgress = all.filter(function(r){ return !isFinalized(r); });
  var byYear = {};
  finalized.forEach(function(r){ var y=parseYear(r[getDateKey(r)]); if(y) byYear[y]=(byYear[y]||0)+1; });
  var yearPills = Object.keys(byYear).sort().map(function(y){ return '<span class="year-pill">'+y+': '+byYear[y]+'</span>'; }).join('');
  var mkpVals = all.map(function(r){ var k=Object.keys(r).find(function(k){ return k.toUpperCase().indexOf('MKP')>=0; }); return k?parseCurrency(r[k]):0; }).filter(function(v){ return v>0; });
  var avgMkp = mkpVals.length ? (mkpVals.reduce(function(a,b){return a+b;},0)/mkpVals.length).toFixed(2) : '—';
  document.getElementById('summary-cards').innerHTML =
    '<div class="summary-card"><div class="card-label">Total de Montagens</div><div class="card-value">'+all.length+'</div><div class="card-sub">'+universeData.assistencia.length+' cliente final · '+universeData.engenharia.length+' engenharia</div></div>'+
    '<div class="summary-card"><div class="card-label">Montagens Finalizadas</div><div class="card-value card-accent">'+finalized.length+'</div><div class="year-grid">'+yearPills+'</div></div>'+
    '<div class="summary-card"><div class="card-label">Em Montagem</div><div class="card-value">'+inProgress.length+'</div><div class="card-sub">sem data de finalização</div></div>'+
    '<div class="summary-card"><div class="card-label">MKP Médio Geral</div><div class="card-value card-accent" style="font-size:2rem">'+avgMkp+'x</div><div class="card-sub">marcação sobre custo</div></div>';
}

function renderUniverseCards() {
  var total = universeData.assistencia.concat(universeData.engenharia).length || 1;
  var univs = [{key:'assistencia',label:'Evviva<br>Cliente Final',cls:'u1'},{key:'engenharia',label:'Canal<br>Engenharia',cls:'u2'}];
  document.getElementById('universe-cards').innerHTML = univs.map(function(u){
    var data = universeData[u.key];
    var pct = Math.round(data.length/total*100);
    var fin = data.filter(isFinalized).length;
    var prog = data.length - fin;
    var mkpVals = data.map(function(r){ var k=Object.keys(r).find(function(k){ return k.toUpperCase().indexOf('MKP')>=0; }); return k?parseCurrency(r[k]):0; }).filter(function(v){ return v>0; });
    var avgMkp = mkpVals.length ? (mkpVals.reduce(function(a,b){return a+b;},0)/mkpVals.length).toFixed(2) : '—';
    return '<div class="universe-card '+u.cls+'"><div class="universe-title">'+u.label+'</div><div class="universe-count">'+data.length+'</div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="universe-stats"><div class="u-stat"><span class="u-stat-val">'+fin+'</span><span class="u-stat-lbl">Finalizadas</span></div><div class="u-stat"><span class="u-stat-val">'+prog+'</span><span class="u-stat-lbl">Em montagem</span></div><div class="u-stat"><span class="u-stat-val">'+avgMkp+'x</span><span class="u-stat-lbl">MKP médio</span></div><div class="u-stat"><span class="u-stat-val">'+pct+'%</span><span class="u-stat-lbl">do total</span></div></div></div>';
  }).join('');
}

function renderMkp() {
  var uFilter = document.getElementById('mkp-universe').value;
  var period = document.getElementById('mkp-period').value;
  var yearFilter = document.getElementById('mkp-year-filter').value;
  var data = [];
  if (uFilter==='all'||uFilter==='assistencia') data=data.concat(universeData.assistencia);
  if (uFilter==='all'||uFilter==='engenharia') data=data.concat(universeData.engenharia);
  data = data.filter(isFinalized);
  if (yearFilter!=='all') data=data.filter(function(r){ return parseYear(r[getDateKey(r)])===yearFilter; });
  var groups={};
  data.forEach(function(r){
    var dk=getDateKey(r);
    var key=period==='year'?parseYear(r[dk]):parseMonthYear(r[dk]);
    if(!key) return;
    if(!groups[key]) groups[key]=[];
    var mk=Object.keys(r).find(function(k){ return k.toUpperCase().indexOf('MKP')>=0; });
    var v=mk?parseCurrency(r[mk]):0;
    if(v>0) groups[key].push(v);
  });
  var sorted=Object.keys(groups).sort().map(function(k){ return [k,groups[k]]; });
  var avgs=sorted.map(function(e){ return [e[0], e[1].length?e[1].reduce(function(a,b){return a+b;},0)/e[1].length:0]; });
  var allMkp=data.map(function(r){ var mk=Object.keys(r).find(function(k){ return k.toUpperCase().indexOf('MKP')>=0; }); return mk?parseCurrency(r[mk]):0; }).filter(function(v){ return v>0; });
  var avg=allMkp.length?allMkp.reduce(function(a,b){return a+b;},0)/allMkp.length:0;
  var mx=allMkp.length?Math.max.apply(null,allMkp):0;
  var mn=allMkp.length?Math.min.apply(null,allMkp):0;
  document.getElementById('mkp-stats').innerHTML=
    '<div class="mkp-stat-card"><div class="mkp-stat-label">MKP Médio</div><div class="mkp-stat-value">'+avg.toFixed(2)+'x</div><div class="mkp-stat-sub">'+allMkp.length+' montagens</div></div>'+
    '<div class="mkp-stat-card"><div class="mkp-stat-label">MKP Máximo</div><div class="mkp-stat-value">'+mx.toFixed(2)+'x</div></div>'+
    '<div class="mkp-stat-card"><div class="mkp-stat-label">MKP Mínimo</div><div class="mkp-stat-value">'+mn.toFixed(2)+'x</div></div>'+
    '<div class="mkp-stat-card"><div class="mkp-stat-label">Períodos</div><div class="mkp-stat-value">'+avgs.length+'</div></div>';
  var maxAvg=avgs.length?Math.max.apply(null,avgs.map(function(e){return e[1];})):1;
  document.getElementById('mkp-bars').innerHTML=avgs.map(function(e){
    return '<div class="bar-row"><span class="bar-row-label">'+e[0]+'</span><div class="bar-track"><div class="bar-fill" style="width:'+(maxAvg>0?Math.round(e[1]/maxAvg*100):0)+'%"></div></div><span class="bar-row-val">'+e[1].toFixed(2)+'x</span></div>';
  }).join('');
}



function findCol(row, name) {
  var clean = function(s){ return s.toUpperCase().replace(/[^A-Z0-9]/g,''); };
  var cn = clean(name);
  var keys = Object.keys(row);
  for (var i=0; i<keys.length; i++) {
    var ck = clean(keys[i]);
    if (ck.indexOf(cn) >= 0 || cn.indexOf(ck) >= 0) return row[keys[i]];
  }
  return '';
}

function renderTableHeaders(tab) {
  document.getElementById('thead-'+tab).innerHTML = COL_LABELS.map(function(l){ return '<th>'+l+'</th>'; }).join('');
}

function renderTable(tab) {
  var data = universeData[tab]||[];
  var searchEl = document.getElementById('search-'+tab); var search = searchEl ? searchEl.value.toLowerCase() : '';
  var yearFEl = document.getElementById('year-filter-'+tab); var yearF = yearFEl ? yearFEl.value : '';
  var statusF = '';
  var filtered = data.filter(function(row){
    var matchSearch = !search || Object.values(row).some(function(v){ return String(v).toLowerCase().indexOf(search)>=0; });
    var dk = getDateKey(row);
    var matchYear = !yearF || parseYear(row[dk]) === yearF;
    var fin = isFinalized(row);
    var matchStatus = !statusF || (statusF==='finalizado'&&fin) || (statusF==='montagem'&&!fin);
    return matchSearch && matchYear && matchStatus;
  });
  var page = pages[tab]||1;
  var total = filtered.length;
  var pageData = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  var tbody = document.getElementById('tbody-'+tab);
  if (!pageData.length) {
    tbody.innerHTML = '<tr><td colspan="'+COLS.length+'" style="text-align:center;padding:2rem;color:var(--gray-400);font-size:.7rem">NENHUM REGISTRO ENCONTRADO</td></tr>';
  } else {
    tbody.innerHTML = pageData.map(function(row){
      return '<tr>'+COLS.map(function(col,i){
        var val = findCol(row,col);
        if (i===0) return '<td class="name-cell" title="'+val+'">'+(val||'—')+'</td>';
        if (col==='DATA FINALIZACAO') {
          var v=String(val||'').trim();
          return v ? '<td><span class="badge badge-finalizado">'+v+'</span></td>' : '<td><span class="badge badge-montagem">Em Montagem</span></td>';
        }
        if (CURRENCY_COLS.indexOf(col)>=0) {
          var n=parseCurrency(val);
          var cls=col==='LUCRO'?'highlight':'';
          return '<td class="'+cls+'">'+(n>0?'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'—')+'</td>';
        }
        if (col==='MKP') return '<td class="highlight">'+(val?parseCurrency(val).toFixed(2)+'x':'—')+'</td>';
        return '<td>'+(val||'—')+'</td>';
      }).join('')+'</tr>';
    }).join('');
  }
  var totalPages = Math.ceil(total/PAGE_SIZE);
  var pEl = document.getElementById('pagination-'+tab);
  if (totalPages<=1) { pEl.innerHTML=''; return; }
  var btns='';
  for(var i=1;i<=Math.min(totalPages,8);i++) {
    btns+='<button class="page-btn'+(i===page?' active':'')+'" data-tab="'+tab+'" data-page="'+i+'">'+i+'</button>';
  }
  if(totalPages>8) btns+='<button class="page-btn" data-tab="'+tab+'" data-page="'+totalPages+'">…'+totalPages+'</button>';
  pEl.innerHTML='<span class="page-info">'+((page-1)*PAGE_SIZE+1)+'–'+Math.min(page*PAGE_SIZE,total)+' de '+total+'</span><div class="page-btns">'+btns+'</div>';
  pEl.querySelectorAll('.page-btn').forEach(function(btn){
    btn.addEventListener('click',function(){ pages[btn.dataset.tab]=parseInt(btn.dataset.page); renderTable(btn.dataset.tab); });
  });
}

function switchTab(tab) {
  ['geral','assistencia','engenharia'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('content-'+t).style.display=t===tab?'block':'none';
  });
}

function showLoading(txt) { document.getElementById('loading-text').textContent=txt; document.getElementById('loading').style.display='flex'; }
function setLoadingText(txt) { document.getElementById('loading-text').textContent=txt; }
function hideLoading() { document.getElementById('loading').style.display='none'; }

setInterval(function(){ if(document.getElementById('dashboard').style.display!=='none') loadData(); }, 5*60*1000);

      if (accounts.length>0) { loadData(); return; }
    }
  } catch(e) { console.error(e); }
  document.getElementById('auth-screen').style.display='flex';
